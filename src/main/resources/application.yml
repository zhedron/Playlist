spring:
  datasource:
    url: jdbc:mysql://localhost:3306/playlist?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB


  security:
    oauth2:
      client:
        registration:
          google:
            client-id:
            client-secret:
            scope:
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account

jwt:
  secret:
    key:
  expiration: 604800000

secret_key:
  aes:
    ${SECRET_KEY}


logging:
  level:
    security:
      TRACE